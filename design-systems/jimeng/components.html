<header class="jimeng-header">
  <a class="jimeng-wordmark" href="#">Jimeng Reference</a>
  <nav class="jimeng-nav" aria-label="Primary">
    <a href="#">文生图</a>
    <a href="#">视频生成</a>
    <a href="#">智能画布</a>
    <a href="#">探索</a>
  </nav>
  <a class="jimeng-button jimeng-button-primary" href="#">开启创作</a>
</header>

<main class="jimeng-page">
  <section class="jimeng-hero">
    <div class="jimeng-hero-media"></div>
    <p class="jimeng-eyebrow">AI 影像创作</p>
    <h1>即刻生成你的视觉梦境。</h1>
    <div class="jimeng-prompt-bar">
      <input type="text" value="水母在海底遨游，电影感，流畅运镜" aria-label="Prompt" />
      <button type="button">生成</button>
    </div>
  </section>

  <section class="jimeng-feature">
    <p class="jimeng-feature-number">01</p>
    <div>
      <p class="jimeng-eyebrow">文/图生视频</p>
      <h2>从首帧到尾帧，精准掌控。</h2>
      <p>Use paired frame inputs, motion controls, and generation progress states for video creation workflows.</p>
      <button type="button">立即创作</button>
    </div>
    <div class="jimeng-video-card">Video preview</div>
  </section>

  <section class="jimeng-gallery" aria-label="Inspiration gallery">
    <article class="jimeng-gallery-card">
      <div class="jimeng-image-slot"></div>
      <p>未来风，机械人形 AI，霓虹背景</p>
      <button type="button">创作同款</button>
    </article>
    <article class="jimeng-gallery-card">
      <div class="jimeng-image-slot"></div>
      <p>电影质感，火光下奔赴战场</p>
      <button type="button">创作同款</button>
    </article>
  </section>

  <section class="jimeng-canvas" aria-label="Smart canvas">
    <div class="jimeng-layer-board">
      <div class="jimeng-layer jimeng-layer-one"></div>
      <div class="jimeng-layer jimeng-layer-two"></div>
      <div class="jimeng-selection"></div>
    </div>
    <aside class="jimeng-tool-palette">
      <button type="button">局部重绘</button>
      <button type="button">一键扩图</button>
      <button type="button">图像消除</button>
      <button type="button">抠图</button>
    </aside>
  </section>
</main>
